<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
<meta name="theme-color" content="#f4f5f7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#121315" media="(prefers-color-scheme: dark)" />
<title>考前刷题</title>

/* pre-paint theme to avoid flash */
(function(){try{var p=localStorage.getItem('exam-practice:theme');var d=(p==='light'||p==='dark')?p:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',d);var z=parseFloat(localStorage.getItem('exam-practice:density'));if(z>=0.8&&z<=1.6)document.documentElement.style.setProperty('--ui-zoom',z);}catch(e){}})();
</script>
<style id="app-css">
:root{
  --bg:#f4f5f7; --surface:#ffffff; --surface-2:#eceef0; --surface-3:#e1e4e7;
  --border:#e0e2e5; --border-strong:#cbced3;
  --text:#191c20; --text-2:#555b62; --text-3:#8a8f98;
  --primary:#0f9d63; --primary-strong:#0b8052; --on-primary:#ffffff;
  --primary-soft:rgba(15,157,99,.12); --primary-ring:rgba(15,157,99,.24);
  --success:#18925a; --success-soft:rgba(24,146,90,.14);
  --danger:#d6584e; --danger-soft:rgba(214,88,78,.12);
  --warning:#cf9015; --warning-soft:rgba(207,144,21,.15);
  --shadow-sm:0 1px 2px rgba(20,22,28,.05);
  --shadow:0 2px 6px rgba(20,22,28,.06), 0 8px 24px rgba(20,22,28,.05);
  --shadow-lg:0 8px 30px rgba(20,22,28,.14);
  --radius:16px; --radius-sm:11px; --radius-xs:8px;
  --maxw:760px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --dot:rgba(25,28,34,.05); --glow:color-mix(in srgb, var(--primary) 7%, transparent);
}
[data-theme="dark"]{
  --bg:#121315; --surface:#1c1e21; --surface-2:#26282c; --surface-3:#313438;
  --border:#303237; --border-strong:#43464c;
  --text:#e8e9eb; --text-2:#a7abb1; --text-3:#767a81;
  --primary:#34c98a; --primary-strong:#4dd69b; --on-primary:#06140d;
  --primary-soft:rgba(52,201,138,.15); --primary-ring:rgba(52,201,138,.3);
  --success:#3fc287; --success-soft:rgba(63,194,135,.16);
  --danger:#e07b6f; --danger-soft:rgba(224,123,111,.16);
  --warning:#d8b063; --warning-soft:rgba(216,176,99,.18);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 2px 6px rgba(0,0,0,.34), 0 8px 24px rgba(0,0,0,.26);
  --shadow-lg:0 10px 34px rgba(0,0,0,.5);
  --dot:rgba(255,255,255,.04); --glow:color-mix(in srgb, var(--primary) 11%, transparent);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:var(--bg)}
body{
  background-color:var(--bg); color:var(--text);
  background-image:
    radial-gradient(135% 78% at 50% -16%, var(--glow), transparent 56%),
    radial-gradient(var(--dot) 1.2px, transparent 1.8px);
  background-size:auto, 22px 22px;
  background-repeat:no-repeat, repeat;
  background-attachment:fixed;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  line-height:1.6; min-height:100dvh; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  zoom:var(--ui-zoom,1);
  transition:background .3s ease, color .3s ease;
}
a{color:var(--primary);text-decoration:none}
button{font-family:inherit}
::selection{background:var(--primary-soft)}
.mono{font-family:ui-monospace,"SF Mono","JetBrains Mono","Menlo",monospace}

/* ---------- App shell ---------- */
.app-header{
  position:sticky; top:0; z-index:40;
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  -webkit-backdrop-filter:saturate(1.4) blur(12px); backdrop-filter:saturate(1.4) blur(12px);
  border-bottom:1px solid transparent;
  transition:border-color .2s;
}
.app-header.scrolled{border-bottom-color:var(--border)}
.app-header-in{
  max-width:var(--maxw); margin:0 auto; padding:12px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;min-width:0}
.brand-mark{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:var(--primary);color:var(--on-primary);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;
}
.brand-name{font-size:17px;font-weight:650;letter-spacing:.2px;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px}
.header-meta{color:var(--text-3);font-size:12.5px;white-space:nowrap}
.icon-btn{
  width:38px;height:38px;border-radius:11px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;
  transition:background .15s,border-color .15s,transform .06s;
}
.icon-btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.icon-btn:active{transform:scale(.94)}
.seg-toggle{border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;min-height:34px;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}
.seg-toggle:hover{border-color:var(--border-strong);color:var(--text)}
.seg-toggle.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

.container{max-width:var(--maxw);margin:0 auto;padding:22px 18px calc(40px + var(--safe-b))}

/* ---------- Buttons ---------- */
.btn{
  cursor:pointer;border:1px solid transparent;background:var(--primary);color:var(--on-primary);
  padding:11px 18px;border-radius:var(--radius-sm);font-size:14.5px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  transition:background .15s,border-color .15s,transform .06s,opacity .15s;
  min-height:44px; white-space:nowrap;
}
.btn:hover{background:var(--primary-strong)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--surface);color:var(--text);border-color:var(--border)}
.btn.ghost:hover{background:var(--surface-2);border-color:var(--border-strong)}
.btn.subtle{background:var(--surface-2);color:var(--text);border-color:transparent}
.btn.subtle:hover{background:var(--surface-3)}
.btn.warn{background:var(--warning);color:#fff}
.btn.warn:hover{filter:brightness(.94)}
.btn.success{background:var(--success);color:#fff}
.btn.success:hover{filter:brightness(.95)}
.btn.sm{padding:8px 13px;min-height:38px;font-size:13.5px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ---------- Home ---------- */
.hero{
  margin-bottom:22px;
}
.hero h1{margin:0 0 8px;font-size:clamp(22px,5vw,29px);font-weight:700;letter-spacing:-.4px}
.hero p{margin:0;color:var(--text-2);font-size:15px;max-width:46ch}
.exam-grid{display:grid;grid-template-columns:1fr;gap:14px}
.exam-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;display:flex;flex-direction:column;gap:12px;
  box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .14s,border-color .14s;
}
.exam-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border-strong)}
.exam-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.exam-card-title{font-size:18px;font-weight:650;letter-spacing:-.2px;line-height:1.35}
.score-ring{flex-shrink:0;text-align:center;line-height:1.1}
.score-ring .n{font-size:19px;font-weight:750;color:var(--primary)}
.score-ring .l{font-size:10.5px;color:var(--text-3)}
.exam-card-meta{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  background:var(--surface-2);color:var(--text-2);padding:3px 11px;border-radius:999px;
  font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:5px;
}
.exam-card-desc{color:var(--text-2);font-size:14px;line-height:1.55}
.exam-card-actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:2px}
.exam-card-actions .btn{flex:0 0 auto}

/* ---------- 背题模式 ---------- */
.recite-top{margin-bottom:14px}
.recite-meta{color:var(--text-3);font-size:12.5px;margin-top:2px}
.recite-list{display:flex;flex-direction:column;gap:12px}
.recite-q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
.rc-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.rc-no{width:26px;height:26px;flex-shrink:0;border-radius:8px;background:var(--surface-2);color:var(--text-2);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.rc-question{font-size:16px;font-weight:550;line-height:1.65;margin-bottom:12px;white-space:pre-wrap;word-break:break-word}
.recite-opts{display:flex;flex-direction:column;gap:7px}
.recite-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14.5px;line-height:1.5}
.recite-opt.correct{background:var(--success-soft);border-color:color-mix(in srgb,var(--success) 40%,transparent)}
.rc-key{flex-shrink:0;font-weight:700;color:var(--text-3);min-width:16px}
.recite-opt.correct .rc-key{color:var(--success)}
.rc-text{flex:1;min-width:0;word-break:break-word}
.rc-tick{color:var(--success);font-weight:800;margin-left:8px;flex-shrink:0}
.recite-blanks{display:flex;flex-direction:column;gap:7px}
.recite-blank{display:flex;align-items:baseline;gap:10px;padding:9px 13px;background:var(--success-soft);border:1px solid color-mix(in srgb,var(--success) 40%,transparent);border-radius:var(--radius-sm)}
.rc-bi{flex-shrink:0;color:var(--success);font-weight:700;font-size:13px}
.rc-ba{flex:1;min-width:0;font-size:14.5px;font-weight:600;color:var(--text);word-break:break-word}
.rc-exp-btn{margin-top:12px;background:var(--surface-2);border:0;color:var(--text-2);font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;font-family:inherit;min-height:36px}
.rc-exp-btn:hover{background:var(--surface-3)}
.recite-explain{display:none;margin-top:10px;padding:11px 13px;background:var(--surface-2);border-radius:var(--radius-xs);font-size:13.5px;color:var(--text-2);line-height:1.65;white-space:pre-wrap}
.recite-explain.open{display:block}

/* ---------- 显示大小弹窗 ---------- */
.density-scrim{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;background:rgba(20,18,14,.4);-webkit-backdrop-filter:blur(1px);backdrop-filter:blur(1px)}
.density-pop{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:22px;width:min(300px,86vw);text-align:center}
.dz-title{font-weight:650;font-size:15px;margin-bottom:16px}
.dz-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px}
.dz-val{font-size:20px;font-weight:750;min-width:64px;color:var(--primary)}
.dz-presets{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.dz-presets .btn{flex:1}

/* ---------- Quiz ---------- */
.quiz-top{margin-bottom:14px}
.quiz-top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:13px}
.back-link{
  display:inline-flex;align-items:center;gap:6px;color:var(--text-2);font-size:13.5px;
  padding:7px 10px;border-radius:9px;cursor:pointer;transition:background .12s;
}
.back-link:hover{background:var(--surface-2);color:var(--text)}
.quiz-title{font-weight:650;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seg{display:inline-flex;background:var(--surface-2);border-radius:999px;padding:3px;gap:2px}
.seg button{
  border:0;background:transparent;color:var(--text-2);cursor:pointer;
  padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;min-height:34px;
  transition:background .15s,color .15s;
}
.seg button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.seg button:not(.active):hover{color:var(--text)}

.redo-banner,.resume-banner{
  border-radius:var(--radius-sm);padding:11px 15px;margin-bottom:13px;
  font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;line-height:1.45;
}
.redo-banner{background:var(--warning-soft);color:var(--text);border:1px solid color-mix(in srgb,var(--warning) 35%,transparent)}
.resume-banner{background:var(--primary-soft);color:var(--text);border:1px solid color-mix(in srgb,var(--primary) 30%,transparent);justify-content:space-between}
.resume-banner .btn{flex-shrink:0}

.progress-wrap{margin-bottom:16px}
.progress-track{background:var(--surface-2);border-radius:999px;height:7px;overflow:hidden}
.progress-fill{background:var(--primary);height:100%;width:0;border-radius:999px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.progress-meta{display:flex;justify-content:space-between;color:var(--text-3);font-size:12.5px;margin-top:7px}
.progress-meta .now{color:var(--text-2);font-weight:600}

.q-scroll{touch-action:pan-y}
.question-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 22px;box-shadow:var(--shadow-sm);
}
.q-type{
  display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;letter-spacing:.4px;
  padding:3px 11px;border-radius:999px;margin-bottom:13px;
  color:var(--primary);background:var(--primary-soft);
}
.q-type.multiple{color:var(--warning);background:var(--warning-soft)}
.q-type.blank{color:var(--success);background:var(--success-soft)}
.q-flag{
  float:right;cursor:pointer;color:var(--text-3);font-size:19px;line-height:1;
  padding:2px 6px;border-radius:8px;transition:color .15s,background .15s;user-select:none;
}
.q-flag:hover{background:var(--surface-2)}
.q-flag.on{color:var(--warning)}
.question-text{font-size:17.5px;font-weight:550;margin:0 0 18px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.options{display:flex;flex-direction:column;gap:9px}
.option{
  display:flex;align-items:flex-start;gap:12px;padding:13px 15px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--surface);
  transition:background .12s,border-color .12s;position:relative;
}
.option:hover{background:var(--surface-2)}
.option .ctrl{
  flex-shrink:0;width:22px;height:22px;border:2px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;margin-top:1px;color:transparent;
  font-size:13px;font-weight:800;transition:all .12s;
}
.option .ctrl.radio{border-radius:50%}
.option .ctrl.check{border-radius:6px}
.option.selected{background:var(--primary-soft);border-color:var(--primary)}
.option.selected .ctrl{border-color:var(--primary);background:var(--primary);color:var(--on-primary)}
.option-body{flex:1;min-width:0}
.option-key{color:var(--text-3);font-weight:700;margin-right:8px;font-size:14px}
.option.selected .option-key{color:var(--primary)}
.option-text{font-size:15.5px;line-height:1.5;word-break:break-word}
.option.locked{pointer-events:none}
.option.correct-opt{background:var(--success-soft);border-color:var(--success)}
.option.correct-opt .ctrl{border-color:var(--success);background:var(--success);color:#fff}
.option.correct-opt .option-key{color:var(--success)}
.option.wrong-opt{background:var(--danger-soft);border-color:var(--danger)}
.option.wrong-opt .ctrl{border-color:var(--danger);background:var(--danger);color:#fff}
.option.wrong-opt .option-key{color:var(--danger)}

.blank-area{display:flex;flex-direction:column;gap:11px}
.blank-row{display:flex;align-items:center;gap:11px}
.blank-index{
  flex-shrink:0;width:27px;height:27px;background:var(--surface-2);color:var(--text-2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
}
.blank-input{
  flex:1;min-width:0;border:1.5px solid var(--border);background:var(--surface);color:var(--text);
  padding:11px 14px;border-radius:var(--radius-sm);font-size:16px;font-family:inherit;
  transition:border-color .12s,box-shadow .12s;
}
.blank-input:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-ring)}
.blank-input.locked{pointer-events:none}
.blank-input.correct-blank{border-color:var(--success);background:var(--success-soft)}
.blank-input.wrong-blank{border-color:var(--danger);background:var(--danger-soft)}
.blank-preview{
  margin-top:15px;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-sm);
  font-size:14px;color:var(--text-2);white-space:pre-wrap;line-height:1.6;
}
.blank-preview b{color:var(--text)}

.feedback{margin-top:18px;padding:15px 16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.6}
.feedback.correct{background:var(--success-soft);border:1px solid color-mix(in srgb,var(--success) 35%,transparent)}
.feedback.wrong{background:var(--danger-soft);border:1px solid color-mix(in srgb,var(--danger) 35%,transparent)}
.feedback.revealed{background:var(--warning-soft);border:1px solid color-mix(in srgb,var(--warning) 35%,transparent)}
.fb-title{font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:7px;font-size:14.5px}
.feedback.correct .fb-title{color:var(--success)}
.feedback.wrong .fb-title{color:var(--danger)}
.feedback.revealed .fb-title{color:var(--warning)}
.fb-line{font-size:13.5px;margin:4px 0;color:var(--text-2)}
.fb-line b{color:var(--text)}
.fb-explain{margin-top:9px;padding:10px 12px;background:color-mix(in srgb,var(--surface) 60%,transparent);border-radius:var(--radius-xs);font-size:13.5px;color:var(--text-2);line-height:1.6}
[data-theme="dark"] .fb-explain{background:rgba(0,0,0,.22)}
.fb-retry{margin-top:12px}

/* sticky action bar */
.action-bar{
  position:sticky;bottom:0;z-index:30;margin:16px -18px 0;
  padding:12px 18px calc(12px + var(--safe-b));
  background:color-mix(in srgb,var(--bg) 86%,transparent);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:9px;
}
.action-bar .left{display:flex;gap:8px;align-items:center}
.action-bar .right{display:flex;gap:8px;align-items:center;margin-left:auto}
.btn.icon-only{padding:0;width:48px;min-width:48px;height:48px;font-size:24px;font-weight:400;line-height:1}
.action-bar .left,.action-bar .right{gap:10px}
.kbd-hint{color:var(--text-3);font-size:11.5px;margin-top:9px;text-align:center}
.kbd-hint kbd{
  font-family:inherit;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;
  padding:1px 6px;font-size:11px;margin:0 1px;color:var(--text-2)
}

/* ---------- Navigator drawer ---------- */
.scrim{
  position:fixed;inset:0;background:rgba(20,18,14,.4);z-index:60;opacity:0;
  transition:opacity .2s;backdrop-filter:blur(1px);pointer-events:none;
}
.scrim.show{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;z-index:61;background:var(--surface);box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;
  top:0;bottom:0;right:0;width:min(380px,86vw);
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  border-left:1px solid var(--border);pointer-events:none;
}
.drawer.show{transform:translateX(0)}
.drawer.show{pointer-events:auto}
.drawer-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid var(--border);
}
.drawer-head h3{margin:0;font-size:16px;font-weight:650}
.drawer-body{padding:18px 20px;overflow-y:auto;overflow-x:hidden;flex:1;min-width:0}
.nav-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;font-size:12px;color:var(--text-2)}
.nav-legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:13px;height:13px;border-radius:5px;display:inline-block;border:1.5px solid var(--border-strong)}
.dot.answered{background:var(--primary-soft);border-color:var(--primary)}
.dot.correct{background:var(--success);border-color:var(--success)}
.dot.wrong{background:var(--danger);border-color:var(--danger)}
.nav-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;align-content:start}
.nav-cell{
  height:48px;align-self:start;min-width:0;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);
  color:var(--text-2);font-weight:650;font-size:15px;cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;transition:transform .08s,border-color .12s;
}
.nav-cell:hover{border-color:var(--border-strong)}
.nav-cell:active{transform:scale(.93)}
.nav-cell.answered{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.nav-cell.correct{background:var(--success);border-color:var(--success);color:#fff}
.nav-cell.wrong{background:var(--danger);border-color:var(--danger);color:#fff}
.nav-cell.current{box-shadow:0 0 0 3px var(--primary-ring);border-color:var(--primary)}
.nav-cell .flag-dot{position:absolute;top:3px;right:4px;color:var(--warning);font-size:11px;line-height:1}
.nav-cell.correct .flag-dot,.nav-cell.wrong .flag-dot{color:#fff}
.drawer-foot{padding:14px 20px calc(16px + var(--safe-b));border-top:1px solid var(--border);display:flex;gap:9px}
.drawer-foot .btn{flex:1}

/* ---------- Result ---------- */
.result-actions{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.result-actions .spacer{flex:1}
.score-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:26px 22px;margin-bottom:16px;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:24px;
}
.score-dial{flex-shrink:0;width:108px;height:108px;position:relative;display:grid;place-items:center}
.score-dial svg{position:absolute;inset:0;transform:rotate(-90deg)}
.score-dial .pct{font-size:30px;font-weight:780;line-height:1}
.score-dial .pl{font-size:11px;color:var(--text-3);margin-top:2px}
.score-info .big{font-size:20px;font-weight:700;margin-bottom:4px}
.score-info .sub{color:var(--text-2);font-size:14px;line-height:1.5}
.score-info .verdict{display:inline-block;margin-top:8px;font-size:13px;font-weight:600;padding:3px 12px;border-radius:999px}

.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.stats-card .stitle{font-weight:650;font-size:14.5px;margin-bottom:4px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:11px;margin-top:14px}
.stat-item{background:var(--surface-2);border-radius:var(--radius-sm);padding:13px 12px;text-align:center}
.stat-item .stat-label{font-size:12px;color:var(--text-3);margin-bottom:5px}
.stat-item .stat-num{font-size:21px;font-weight:750;color:var(--text)}
.stat-item .stat-pct{font-size:12px;color:var(--text-2);margin-top:3px;font-weight:600}
.stat-item.good .stat-num,.stat-item.good .stat-pct{color:var(--success)}
.stat-item.bad .stat-num,.stat-item.bad .stat-pct{color:var(--danger)}

.result-list{display:flex;flex-direction:column;gap:11px}
.result-q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:17px 19px;box-shadow:var(--shadow-sm);border-left-width:4px}
.result-q.correct{border-left-color:var(--success)}
.result-q.wrong{border-left-color:var(--danger)}
.result-q .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:10px}
.result-q .qno{font-weight:650;font-size:14px}
.result-q .qno .ty{color:var(--text-3);font-size:12.5px;font-weight:500;margin-left:6px}
.badge{font-size:12px;font-weight:700;padding:3px 11px;border-radius:999px;white-space:nowrap}
.badge.correct{background:var(--success-soft);color:var(--success)}
.badge.wrong{background:var(--danger-soft);color:var(--danger)}
.result-q .qtext{font-weight:550;margin-bottom:10px;white-space:pre-wrap;line-height:1.55;word-break:break-word}
.result-q .line{font-size:13.5px;color:var(--text-2);margin:5px 0;line-height:1.55}
.result-q .line b{color:var(--text)}
.result-q .explain{margin-top:10px;padding:11px 13px;background:var(--surface-2);border-radius:var(--radius-xs);font-size:13.5px;color:var(--text-2);line-height:1.6}

/* ---------- Misc ---------- */
.empty{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty .ico{font-size:42px;margin-bottom:14px;opacity:.8}
.empty .btn{margin-top:18px}
.section-label{font-size:13px;font-weight:650;color:var(--text-2);margin:6px 0 12px;letter-spacing:.3px}
.toast{
  position:fixed;left:50%;bottom:calc(28px + var(--safe-b));transform:translateX(-50%) translateY(8px);
  background:var(--text);color:var(--bg);padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:500;
  opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:90;box-shadow:var(--shadow-lg);max-width:88vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spinner{width:26px;height:26px;border:3px solid var(--surface-2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* history list inside drawer */
.hist-item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:9px;cursor:pointer;transition:background .12s,border-color .12s}
.hist-item:hover{background:var(--surface-2);border-color:var(--border-strong)}
.hist-item .when{font-size:13px;color:var(--text-2)}
.hist-item .sc{font-weight:700;color:var(--primary)}
.hist-item .sc small{color:var(--text-3);font-weight:500;margin-left:5px}

/* ---------- Auth + Manage ---------- */
.header-user{font-size:13px;font-weight:600;color:var(--text-2);background:var(--surface-2);padding:5px 12px;border-radius:999px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.login-wrap{max-width:380px;margin:6vh auto 0;display:flex;flex-direction:column;gap:18px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow)}
.login-card h2{margin:0 0 6px;font-size:22px;font-weight:750;letter-spacing:-.3px}
.login-card .sub{margin:0 0 20px;color:var(--text-2);font-size:14px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:13px;font-weight:600;color:var(--text-2)}
.field input{border:1.5px solid var(--border);background:var(--surface);color:var(--text);padding:12px 14px;border-radius:var(--radius-sm);font-size:16px;font-family:inherit;transition:border-color .12s,box-shadow .12s}
.field input:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-ring)}
.login-err{color:var(--danger);font-size:13px;min-height:18px;margin-bottom:6px;line-height:1.5}
.login-card .btn{width:100%}
.login-hint{color:var(--text-3);font-size:12.5px;text-align:center;line-height:1.7}
.login-hint b{color:var(--text-2)}
.manage-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.bank-row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.bank-row .info{min-width:0}
.bank-row .nm{font-weight:650;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bank-row .mt{color:var(--text-3);font-size:12.5px;margin-top:2px}
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-top:8px}
.add-card textarea{width:100%;min-height:150px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:ui-monospace,"SF Mono",Menlo,monospace;line-height:1.6;resize:vertical}
.add-card textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-ring)}
.add-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}

/* ---------- Responsive ---------- */
@media (min-width:880px){
  :root{--maxw:820px}
}
@media (min-width:600px){
  .exam-grid{grid-template-columns:repeat(2,1fr)}
  .exam-card.solo{grid-column:1/-1}
}
@media (max-width:599px){
  .container{padding:18px 14px calc(34px + var(--safe-b))}
  .action-bar{margin:14px -14px 0;padding:11px 14px calc(11px + var(--safe-b))}
  .question-card{padding:20px 17px}
  .question-text{font-size:16.5px}
  .score-card{flex-direction:column;text-align:center;gap:16px;padding:24px 18px}
  .btn .label-full{display:none}
}
/* landscape phones: trim vertical space */
@media (max-height:500px) and (orientation:landscape){
  .container{padding-top:12px}
  .hero{margin-bottom:14px}
  .question-card{padding:16px 18px}
  .question-text{margin-bottom:12px}
  .action-bar{padding-top:8px;padding-bottom:calc(8px + var(--safe-b))}
  .kbd-hint{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}

<body>
<header class="app-header" id="app-header">
  <div class="app-header-in">
    <div class="brand" id="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 7.2l1.8 1.8 3-3.2"></path><path d="M3.5 15.2l1.8 1.8 3-3.2"></path><line x1="12.5" y1="6.5" x2="20.5" y2="6.5"></line><line x1="12.5" y1="15.5" x2="20.5" y2="15.5"></line></svg></div>
      <span class="brand-name">考前刷题</span>
    </div>
    <div class="header-right">
      <span class="header-meta" id="header-meta"></span>
      <span class="header-user" id="header-user" style="display:none"></span>
      <button class="icon-btn" id="manage-btn" title="管理题库" aria-label="管理题库" style="display:none">＋</button>
      <button class="icon-btn" id="density-btn" title="显示大小" aria-label="调节显示大小" style="font-size:14px;font-weight:700">Aa</button>
      <button class="icon-btn" id="theme-btn" title="切换深色 / 浅色" aria-label="切换主题">☀</button>
      <button class="icon-btn" id="logout-btn" title="退出登录" aria-label="退出登录" style="display:none">⏻</button>
    </div>
  </div>
</header>
<main class="container"><div id="view"></div></main>
<div class="toast" id="toast"></div>

<!-- ============ Shared quiz engine (also embedded into offline export) ============ -->
<script type="text/plain" id="engine-js">
/* global helpers */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function typeName(t){return {single:'单选',multiple:'多选',blank:'填空',judge:'判断'}[t]||t;}
function renderBlankHTML(t){var ps=String(t).split('___');var h='';ps.forEach(function(s,i){h+=esc(s);if(i<ps.length-1)h+='<b style="color:var(--primary)">['+(i+1)+']</b>';});return h;}
function normBlank(s){return String(s==null?'':s).trim().toLowerCase();}
function arraysEqualAsSet(a,b){if(!a||!b||a.length!==b.length)return false;var sa=a.slice().sort();var sb=b.slice().sort();return sa.every(function(v,i){return v===sb[i];});}
function gradeQuestion(q,ua){
  if(ua===undefined||ua===null)return {correct:false,answered:false};
  if(q.type==='single'||q.type==='multiple'||q.type==='judge'){
    var ans=Array.isArray(ua)?ua:[];
    return {correct:arraysEqualAsSet(ans,q.answer),answered:ans.length>0};
  }
  if(q.type==='blank'){
    if(!Array.isArray(ua)||ua.length!==q.blanks.length)return {correct:false,answered:false};
    var any=ua.some(function(x){return String(x||'').trim()!=='';});
    var ok=ua.every(function(u,i){return q.blanks[i].map(normBlank).indexOf(normBlank(u))>=0;});
    return {correct:ok,answered:any};
  }
  return {correct:false,answered:false};
}
function fmtOpts(q){if(q.type==='judge'){return [{key:'✓',text:'正确'},{key:'✕',text:'错误'}];}var L=['A','B','C','D','E','F','G','H','I','J'];return (q.options||[]).map(function(o,i){return {key:L[i],text:typeof o==='string'?o:(o&&o.text||'')};});}
function isAnswered(q,ua){return gradeQuestion(q,ua).answered;}

/* theme */
var THEME_KEY='exam-practice:theme';
function getThemePref(){try{return localStorage.getItem(THEME_KEY)||'auto';}catch(e){return 'auto';}}
function resolveTheme(p){return (p==='light'||p==='dark')?p:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');}
function applyTheme(){document.documentElement.setAttribute('data-theme',resolveTheme(getThemePref()));}
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';var next=cur==='dark'?'light':'dark';try{localStorage.setItem(THEME_KEY,next);}catch(e){}applyTheme();}
function themeGlyph(){return document.documentElement.getAttribute('data-theme')==='dark'?'☾':'☀';}

/* ---------------- Quiz engine ---------------- */
var __quizKeyHandler=null;
function mountQuiz(opts){
  var root=opts.root, baseQuestions=opts.questions;
  var questions, total;
  var persistKey=opts.persistKey||null;
  var st=Object.assign({answers:{},idx:0,mode:'practice',reviewed:{},revealed:{},flagged:{},shuffle:false,order:null},opts.initialState||{});
  st.navOpen=false;
  function shuffledIndices(n){var a=[];for(var i=0;i<n;i++)a.push(i);for(var j=n-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var t=a[j];a[j]=a[k];a[k]=t;}return a;}
  function applyOrder(){var n=baseQuestions.length;if(st.shuffle){if(!st.order||st.order.length!==n)st.order=shuffledIndices(n);}else{st.order=null;}questions=st.order?st.order.map(function(i){return baseQuestions[i];}):baseQuestions.slice();total=questions.length;}
  applyOrder();
  if(st.idx>=total)st.idx=0;
  var showResume=!!opts.resumed;

  function save(){if(!persistKey)return;try{localStorage.setItem(persistKey,JSON.stringify({answers:st.answers,idx:st.idx,mode:st.mode,reviewed:st.reviewed,revealed:st.revealed,flagged:st.flagged,shuffle:st.shuffle,order:st.order}));}catch(e){}}
  function clearSaved(){if(persistKey){try{localStorage.removeItem(persistKey);}catch(e){}}}

  function cellState(i){
    var q=questions[i],ua=st.answers[q.id];
    if(st.reviewed[q.id])return gradeQuestion(q,ua).correct?'correct':'wrong';
    if(isAnswered(q,ua))return 'answered';
    return 'unans';
  }
  function doneCount(){var n=0;questions.forEach(function(q){if(st.reviewed[q.id]||st.revealed[q.id]||isAnswered(q,st.answers[q.id]))n++;});return n;}

  function go(i){st.idx=Math.max(0,Math.min(total-1,i));save();render();var sc=root.querySelector('.q-scroll');}
  function next(){if(st.idx<total-1)go(st.idx+1);}
  function prev(){if(st.idx>0)go(st.idx-1);}

  function confirmSubmit(){
    var un=0;questions.forEach(function(q){if(!isAnswered(q,st.answers[q.id]))un++;});
    if(un>0 && !confirm('还有 '+un+' 题未作答，确定提交答卷？'))return;
    submit();
  }
  function submit(){
    var correct=0;questions.forEach(function(q){if(gradeQuestion(q,st.answers[q.id]).correct)correct++;});
    var score=total?Math.round(correct/total*100):0;
    clearSaved();
    if(__quizKeyHandler){document.removeEventListener('keydown',__quizKeyHandler);__quizKeyHandler=null;}
    opts.onSubmit({answers:JSON.parse(JSON.stringify(st.answers)),correct:correct,total:total,score:score,finishedAt:Date.now(),flagged:st.flagged});
  }

  function answerBody(q,locked,revealOnly){
    var ua=st.answers[q.id];
    if(q.type==='single'||q.type==='judge'){
      var O=fmtOpts(q),ci=q.answer[0],ui=ua?ua[0]:-1;
      return '<div class="options">'+O.map(function(o,i){
        var cls='option';if(locked||revealOnly)cls+=' locked';
        if(ua&&ui===i)cls+=' selected';
        if(locked&&ui===i&&ui!==ci)cls+=' wrong-opt';
        if((locked||revealOnly)&&i===ci)cls+=' correct-opt';
        return '<label class="'+cls+'" data-idx="'+i+'"><span class="ctrl radio">✓</span><span class="option-body"><span class="option-key">'+o.key+'</span><span class="option-text">'+esc(o.text)+'</span></span></label>';
      }).join('')+'</div>';
    }
    if(q.type==='multiple'){
      var O2=fmtOpts(q),S=new Set(ua||[]),CS=new Set(q.answer);
      return '<div class="options">'+O2.map(function(o,i){
        var cls='option';if(locked||revealOnly)cls+=' locked';
        if(S.has(i))cls+=' selected';
        if(locked){if(S.has(i)&&!CS.has(i))cls+=' wrong-opt';if(CS.has(i))cls+=' correct-opt';}
        else if(revealOnly){if(CS.has(i))cls+=' correct-opt';}
        return '<label class="'+cls+'" data-idx="'+i+'"><span class="ctrl check">✓</span><span class="option-body"><span class="option-key">'+o.key+'</span><span class="option-text">'+esc(o.text)+'</span></span></label>';
      }).join('')+'</div>';
    }
    /* blank */
    var ub=ua||(q.blanks||[]).map(function(){return '';});
    var rows=q.blanks.map(function(_,i){
      var cls='blank-input';if(locked||revealOnly)cls+=' locked';
      if(locked){var ok=q.blanks[i].map(normBlank).indexOf(normBlank(ub[i]||''))>=0;cls+=ok?' correct-blank':' wrong-blank';}
      return '<div class="blank-row"><div class="blank-index">'+(i+1)+'</div><input class="'+cls+'" data-bi="'+i+'" value="'+esc(ub[i]||'')+'" placeholder="空 '+(i+1)+'" '+((locked||revealOnly)?'readonly':'')+' enterkeyhint="next" /></div>';
    }).join('');
    return '<div class="blank-area">'+rows+'</div><div class="blank-preview">'+renderBlankHTML(q.question)+'</div>';
  }

  function feedbackHTML(q){
    var ua=st.answers[q.id];
    var reviewed=st.reviewed[q.id],revealed=st.revealed[q.id];
    if(!reviewed&&!revealed)return '';
    var O=q.type!=='blank'?fmtOpts(q):null,uH='',cH='';
    if(q.type==='single'||q.type==='judge'){uH=(ua&&ua.length)?(O[ua[0]]?(O[ua[0]].key+'. '+esc(O[ua[0]].text)):'?'):'（未作答）';cH=O[q.answer[0]]?(O[q.answer[0]].key+'. '+esc(O[q.answer[0]].text)):'';}
    else if(q.type==='multiple'){uH=(ua&&ua.length)?ua.map(function(i){return O[i]?O[i].key:'?';}).join(' ')||'（未作答）':'（未作答）';cH=q.answer.map(function(i){return O[i]?(O[i].key+'. '+esc(O[i].text)):'';}).join(' / ');}
    else{uH=(ua&&ua.length)?ua.map(function(v,i){return '空'+(i+1)+': <b>'+esc(v||'（空）')+'</b>';}).join('<br/>'):'（未作答）';cH=q.blanks.map(function(a,i){return '空'+(i+1)+': <b>'+a.map(esc).join(' / ')+'</b>';}).join('<br/>');}
    if(reviewed){
      var ok=gradeQuestion(q,ua).correct;
      return '<div class="feedback '+(ok?'correct':'wrong')+'"><div class="fb-title">'+(ok?'✓ 答对了':'✗ 答错了')+'</div><div class="fb-line">你的答案：'+uH+'</div>'+(!ok?'<div class="fb-line">正确答案：'+cH+'</div>':'')+(q.explanation?'<div class="fb-explain">解析 · '+esc(q.explanation)+'</div>':'')+(!ok&&st.mode==='practice'?'<button class="btn ghost sm fb-retry" data-retry>重新作答 ↻</button>':'')+'</div>';
    }
    return '<div class="feedback revealed"><div class="fb-title">参考答案</div><div class="fb-line">'+cH+'</div>'+(q.explanation?'<div class="fb-explain">解析 · '+esc(q.explanation)+'</div>':'')+'</div>';
  }

  function navDrawer(){
    var cells=questions.map(function(q,i){
      var s=cellState(i);
      return '<button class="nav-cell '+s+(i===st.idx?' current':'')+'" data-nav="'+i+'">'+(st.flagged[q.id]?'<span class="flag-dot">⚑</span>':'')+(i+1)+'</button>';
    }).join('');
    return '<div class="scrim'+(st.navOpen?' show':'')+'" data-close-nav></div>'+
      '<aside class="drawer'+(st.navOpen?' show':'')+'">'+
      '<div class="drawer-head"><h3>题目导航</h3><button class="icon-btn" data-close-nav>✕</button></div>'+
      '<div class="drawer-body">'+
        '<div class="nav-legend"><span><i class="dot"></i>未答</span><span><i class="dot answered"></i>已选</span><span><i class="dot correct"></i>对</span><span><i class="dot wrong"></i>错</span><span><i style="color:var(--warning)">⚑</i>标记</span></div>'+
        '<div class="nav-grid">'+cells+'</div>'+
      '</div>'+
      '<div class="drawer-foot"><button class="btn ghost" data-jump-flag>跳到标记</button><button class="btn success" data-do-submit>提交答卷</button></div>'+
      '</aside>';
  }

  function render(){
    var q=questions[st.idx];
    var reviewed=st.reviewed[q.id],revealed=st.revealed[q.id];
    var locked=reviewed; var revealOnly=revealed&&!reviewed;
    var answered=isAnswered(q,st.answers[q.id]);
    var isLast=st.idx===total-1;
    var done=doneCount();

    // primary button
    var primLabel,primClass='btn';
    if(st.mode==='practice'&&!reviewed){primLabel='确认';primClass='btn';}
    else if(!isLast){primLabel='下一题 →';}
    else {primLabel='提交答卷';primClass='btn success';}

    var html=''+
      (opts.redoInfo?'<div class="redo-banner">错题重做 · 本组 '+total+' 题（原卷共 '+opts.redoInfo.original+' 题）</div>':'')+
      (showResume?'<div class="resume-banner"><span>已自动恢复上次进度</span><button class="btn subtle sm" data-restart>从头开始</button></div>':'')+
      '<div class="quiz-top">'+
        '<div class="quiz-top-row">'+
          '<div class="back-link" data-exit>‹ 返回</div>'+
          '<div class="seg" role="tablist"><button data-mode="practice" class="'+(st.mode==='practice'?'active':'')+'">练习</button><button data-mode="exam" class="'+(st.mode==='exam'?'active':'')+'">考试</button></div>'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<button class="seg-toggle'+(st.shuffle?' on':'')+'" data-shuffle title="乱序题目顺序">乱序</button>'+
            '<button class="icon-btn" data-open-nav title="题目导航">▦</button>'+
          '</div>'+
        '</div>'+
        '<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:'+(total?(done/total*100):0).toFixed(1)+'%"></div></div>'+
        '<div class="progress-meta"><span class="now">第 '+(st.idx+1)+' / '+total+' 题</span><span>已完成 '+done+' / '+total+'</span></div></div>'+
      '</div>'+
      '<div class="q-scroll fade-in" key="'+st.idx+'">'+
        '<div class="question-card">'+
          '<span class="q-flag'+(st.flagged[q.id]?' on':'')+'" data-flag title="标记本题">⚑</span>'+
          '<div class="q-type '+q.type+'">'+typeName(q.type)+'</div>'+
          '<div class="question-text">'+(q.type==='blank'?renderBlankHTML(q.question):esc(q.question))+'</div>'+
          answerBody(q,locked,revealOnly)+
          feedbackHTML(q)+
        '</div>'+
      '</div>'+
      '<div class="action-bar">'+
        '<div class="left"><button class="btn ghost icon-only" data-prev '+(st.idx===0?'disabled':'')+' title="上一题">‹</button>'+
          (st.mode==='practice'?'<button class="btn ghost sm" data-reveal '+((reviewed||revealed)?'disabled':'')+'>显示答案</button>':'')+
        '</div>'+
        '<div class="right">'+
          (!isLast?'<button class="btn ghost icon-only" data-next title="下一题">›</button>':'')+
          '<button class="'+primClass+'" data-primary>'+primLabel+'</button>'+
        '</div>'+
      '</div>'+
      '<div class="kbd-hint"><kbd>1</kbd>–<kbd>9</kbd> 选项 · <kbd>←</kbd><kbd>→</kbd> 翻题 · <kbd>Enter</kbd> '+(st.mode==='practice'&&!reviewed?'确认':'下一题')+' · <kbd>F</kbd> 标记</div>'+
      navDrawer();

    root.innerHTML=html;
    bind(q,locked,revealOnly);
  }

  function bind(q,locked,revealOnly){
    var qa=function(s){return root.querySelector(s);};
    var qaa=function(s){return Array.prototype.slice.call(root.querySelectorAll(s));};
    qa('[data-exit]')&&(qa('[data-exit]').onclick=function(){if(__quizKeyHandler){document.removeEventListener('keydown',__quizKeyHandler);__quizKeyHandler=null;}opts.onExit&&opts.onExit();});
    qa('[data-prev]')&&(qa('[data-prev]').onclick=prev);
    qa('[data-next]')&&(qa('[data-next]').onclick=next);
    var rb=qa('[data-restart]');if(rb)rb.onclick=function(){st.answers={};st.idx=0;st.reviewed={};st.revealed={};st.flagged={};showResume=false;clearSaved();render();};
    qaa('[data-mode]').forEach(function(b){b.onclick=function(){if(b.dataset.mode===st.mode)return;st.mode=b.dataset.mode;st.reviewed={};st.revealed={};save();render();};});
    var shb=qa('[data-shuffle]');if(shb)shb.onclick=function(){var curId=questions[st.idx]&&questions[st.idx].id;st.shuffle=!st.shuffle;st.order=null;applyOrder();var ni=curId!=null?questions.findIndex(function(qq){return qq.id===curId;}):0;st.idx=ni>=0?ni:0;save();window.__toast&&window.__toast(st.shuffle?'已乱序':'已恢复原顺序');render();};
    var fl=qa('[data-flag]');if(fl)fl.onclick=function(){if(st.flagged[q.id])delete st.flagged[q.id];else st.flagged[q.id]=true;save();render();};
    var rv=qa('[data-reveal]');if(rv)rv.onclick=function(){st.revealed[q.id]=true;save();render();};
    var rt=qa('[data-retry]');if(rt)rt.onclick=function(){delete st.reviewed[q.id];delete st.revealed[q.id];delete st.answers[q.id];save();render();};
    var pr=qa('[data-primary]');if(pr)pr.onclick=primaryAction;
    // nav drawer
    qa('[data-open-nav]')&&(qa('[data-open-nav]').onclick=function(){st.navOpen=true;render();});
    qaa('[data-close-nav]').forEach(function(b){b.onclick=function(){st.navOpen=false;render();};});
    qaa('[data-nav]').forEach(function(b){b.onclick=function(){st.navOpen=false;go(+b.dataset.nav);};});
    var sb=qa('[data-do-submit]');if(sb)sb.onclick=function(){st.navOpen=false;confirmSubmit();};
    var jf=qa('[data-jump-flag]');if(jf)jf.onclick=function(){var t=questions.findIndex(function(qq){return st.flagged[qq.id];});if(t<0){window.__toast&&window.__toast('没有标记的题');return;}st.navOpen=false;go(t);};

    // option / blank inputs
    if((q.type==='single'||q.type==='multiple'||q.type==='judge')&&!locked&&!revealOnly){
      qaa('.option').forEach(function(opt){
        opt.onclick=function(){selectOption(q,+opt.dataset.idx);};
      });
    } else if(q.type==='blank'&&!locked&&!revealOnly){
      qaa('.blank-input').forEach(function(inp){
        inp.oninput=function(){var bi=+inp.dataset.bi;var cur=st.answers[q.id]||(q.blanks||[]).map(function(){return '';});cur[bi]=inp.value;st.answers[q.id]=cur;save();};
        inp.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();var ins=qaa('.blank-input');var k=ins.indexOf(inp);if(k<ins.length-1)ins[k+1].focus();else primaryAction();}};
      });
    }
    // swipe
    var scroll=qa('.q-scroll');if(scroll)attachSwipe(scroll);

    function primaryAction(){
      if(st.mode==='practice'&&!st.reviewed[q.id]){
        if(!isAnswered(q,st.answers[q.id])){window.__toast&&window.__toast('请先作答');return;}
        st.reviewed[q.id]=true;save();render();return;
      }
      if(st.idx<total-1)next();else confirmSubmit();
    }
    window.__primaryAction=primaryAction;
  }

  function selectOption(q,idx){
    if(q.type==='single'||q.type==='judge'){
      st.answers[q.id]=[idx];
    } else {
      var cur=new Set(st.answers[q.id]||[]);
      if(cur.has(idx))cur.delete(idx);else cur.add(idx);
      st.answers[q.id]=Array.from(cur).sort(function(a,b){return a-b;});
    }
    save();
    // light update without full re-render to keep it snappy
    var root2=root;
    Array.prototype.slice.call(root2.querySelectorAll('.option')).forEach(function(o){
      var i=+o.dataset.idx;var sel=(st.answers[q.id]||[]).indexOf(i)>=0;o.classList.toggle('selected',sel);
    });
  }

  function attachSwipe(el){
    var x0=null,y0=null,t0=0;
    el.addEventListener('touchstart',function(e){var t=e.touches[0];x0=t.clientX;y0=t.clientY;t0=Date.now();},{passive:true});
    el.addEventListener('touchend',function(e){
      if(x0==null)return;var t=e.changedTouches[0];var dx=t.clientX-x0,dy=t.clientY-y0;
      if(Date.now()-t0<600&&Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.6){if(dx<0)next();else prev();}
      x0=null;
    },{passive:true});
  }

  // keyboard
  if(__quizKeyHandler){document.removeEventListener('keydown',__quizKeyHandler);}
  __quizKeyHandler=function(e){
    if(e.target&&/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName))return;
    if(e.metaKey||e.ctrlKey||e.altKey)return;
    var q=questions[st.idx];
    if(st.navOpen&&e.key==='Escape'){st.navOpen=false;render();return;}
    if(e.key==='ArrowRight'){e.preventDefault();next();return;}
    if(e.key==='ArrowLeft'){e.preventDefault();prev();return;}
    if(e.key==='Enter'){e.preventDefault();window.__primaryAction&&window.__primaryAction();return;}
    if(e.key==='f'||e.key==='F'){if(st.flagged[q.id])delete st.flagged[q.id];else st.flagged[q.id]=true;save();render();return;}
    if((e.key==='r'||e.key==='R')&&st.mode==='practice'&&!st.reviewed[q.id]&&!st.revealed[q.id]){st.revealed[q.id]=true;save();render();return;}
    if(/^[1-9]$/.test(e.key)){
      var idx=+e.key-1;
      if((q.type==='single'||q.type==='multiple'||q.type==='judge')&&!st.reviewed[q.id]&&!st.revealed[q.id]&&idx<fmtOpts(q).length){selectOption(q,idx);}
      return;
    }
  };
  document.addEventListener('keydown',__quizKeyHandler);

  render();
}

/* ---------------- Result view ---------------- */
function renderResultView(opts){
  var root=opts.root, qs=opts.scopeQuestions, ans=opts.answers, all=opts.allQuestions||qs;
  var score=opts.score, correct=opts.correct, total=opts.total;
  var verdict = score>=85?{t:'优秀',c:'var(--success)',b:'var(--success-soft)'} : score>=60?{t:'及格',c:'var(--warning)',b:'var(--warning-soft)'} : {t:'继续加油',c:'var(--danger)',b:'var(--danger-soft)'};

  var ts={single:{total:0,correct:0},multiple:{total:0,correct:0},blank:{total:0,correct:0}};
  qs.forEach(function(q){var s=ts[q.type];if(!s)return;s.total++;if(gradeQuestion(q,ans[q.id]).correct)s.correct++;});
  var tl={single:'单选',multiple:'多选',blank:'填空'};
  var statsHTML=['single','multiple','blank'].filter(function(t){return ts[t].total>0;}).map(function(t){
    var x=ts[t],pct=Math.round(x.correct/x.total*100);var cls=pct>=80?'good':(pct<60?'bad':'');
    return '<div class="stat-item '+cls+'"><div class="stat-label">'+tl[t]+'</div><div class="stat-num">'+x.correct+'/'+x.total+'</div><div class="stat-pct">'+pct+'%</div></div>';
  }).join('');

  var listHTML=qs.map(function(q){
    var no=all.indexOf(q)+1;var ua=ans[q.id];var ok=gradeQuestion(q,ua).correct;
    var O=q.type!=='blank'?fmtOpts(q):null,uH='',cH='';
    if(q.type==='single'||q.type==='judge'){uH=(ua&&ua.length)?(O[ua[0]]?O[ua[0]].key+'. '+esc(O[ua[0]].text):'?'):'（未作答）';cH=q.answer.map(function(i){return O[i]?O[i].key+'. '+esc(O[i].text):'';}).join(' / ');}
    else if(q.type==='multiple'){uH=(ua&&ua.length)?ua.map(function(i){return O[i]?O[i].key:'?';}).join(' '):'（未作答）';cH=q.answer.map(function(i){return O[i]?O[i].key+'. '+esc(O[i].text):'';}).join(' / ');}
    else{uH=(ua&&ua.length)?ua.map(function(v,i){return '空'+(i+1)+': <b>'+esc(v||'（空）')+'</b>';}).join('<br/>'):'（未作答）';cH=q.blanks.map(function(a,i){return '空'+(i+1)+': <b>'+a.map(esc).join(' / ')+'</b>';}).join('<br/>');}
    return '<div class="result-q '+(ok?'correct':'wrong')+'"><div class="head"><div class="qno">第 '+no+' 题<span class="ty">'+typeName(q.type)+'</span></div><div class="badge '+(ok?'correct':'wrong')+'">'+(isAnswered(q,ua)?(ok?'答对':'答错'):'未作答')+'</div></div>'+
      '<div class="qtext">'+(q.type==='blank'?renderBlankHTML(q.question):esc(q.question))+'</div>'+
      '<div class="line">你的答案：'+uH+'</div>'+
      (!ok?'<div class="line">正确答案：'+cH+'</div>':'')+
      (q.explanation?'<div class="explain">解析 · '+esc(q.explanation)+'</div>':'')+'</div>';
  }).join('');

  var R=54, C=2*Math.PI*R, off=C*(1-score/100);
  var actionsHTML=(opts.actions||[]).map(function(a,i){return '<button class="btn '+(a.kind||'ghost')+'" data-act="'+i+'">'+esc(a.label)+'</button>';}).join('');

  root.innerHTML=''+
    (opts.redoLabel?'<div class="redo-banner">'+esc(opts.redoLabel)+'</div>':'')+
    '<div class="result-actions">'+actionsHTML+'</div>'+
    '<div class="score-card fade-in">'+
      '<div class="score-dial"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="'+R+'" fill="none" stroke="var(--surface-2)" stroke-width="11"/><circle cx="60" cy="60" r="'+R+'" fill="none" stroke="'+verdict.c+'" stroke-width="11" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg><div style="display:grid;place-items:center;text-align:center"><div class="pct">'+score+'<span style="font-size:16px">%</span></div><div class="pl">正确率</div></div></div>'+
      '<div class="score-info"><div class="big">答对 '+correct+' / '+total+' 题</div><div class="sub">'+esc(opts.subtitle||'')+'</div><span class="verdict" style="color:'+verdict.c+';background:'+verdict.b+'">'+verdict.t+'</span></div>'+
    '</div>'+
    (statsHTML?'<div class="stats-card"><div class="stitle">分题型统计</div><div class="stats-row">'+statsHTML+'</div></div>':'')+
    '<div class="section-label">逐题回顾</div>'+
    '<div class="result-list">'+listHTML+'</div>';

  Array.prototype.slice.call(root.querySelectorAll('[data-act]')).forEach(function(b){
    b.onclick=function(){var a=opts.actions[+b.dataset.act];a&&a.onClick&&a.onClick();};
  });
}
</script>

function setDensity(v){v=Math.max(0.8,Math.min(1.6,Math.round(v*100)/100));try{localStorage.setItem(DENSITY_KEY,v);}catch(e){}applyDensity();return v;}

function openDensity(){
  var wrap=document.createElement('div');wrap.className='density-scrim';

  function close(){wrap.remove();}

/* ---- 本地演示模式的题库存储（DEMO_MODE 下“管理题库”的增删写这里） ---- */

function mockSaveBank(ex){var all=mockBanks();all[ex.id]=ex;localStorage.setItem(MOCK_BANKS_KEY,JSON.stringify(all));}

function examMeta(ex){return {id:ex.id,file:ex.id+'.json',title:ex.title||ex.id,subject:ex.subject||'',examDate:ex.examDate||'',duration:ex.duration||0,description:ex.description||'',questionCount:(ex.questions||[]).length};}
function validateBank(ex){
  if(!ex||typeof ex!=='object'||Array.isArray(ex))throw new Error('不是合法的题库对象');
  if(!ex.id||!/^[A-Za-z0-9_-]+$/.test(ex.id))throw new Error('缺少合法 id（只能含字母、数字、- 和 _）');
  if(!ex.title)throw new Error('缺少 title（标题）');
  if(!Array.isArray(ex.questions)||!ex.questions.length)throw new Error('questions 不能为空');
  return ex;
}

/* ===================== API 层 ===================== */
var api={
  async login(username,password){
    if(DEMO_MODE){
      if(DEMO_USERS[username]&&DEMO_USERS[username]===password)return {token:'demo.'+btoa(username+':'+Date.now()),username:username};
      throw new Error('账号或密码错误');
    }
    var r=await fetch(API_BASE+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username,password:password})});
    if(!r.ok){var e=await r.json().catch(function(){return {};});throw new Error(e.error||'登录失败');}
    return r.json();
  },
  async manifest(){
    if(DEMO_MODE){
      var base={exams:[]};
      try{base=await (await fetch('./data/manifest.json',{cache:'no-cache'})).json();}catch(e){}
      var metas=await Promise.all((base.exams||[]).map(async function(m){
        try{var full=await (await fetch('./data/'+m.file,{cache:'no-cache'})).json();return examMeta(Object.assign({},m,full));}
        catch(e){return Object.assign({questionCount:0},m);}
      }));
      var custom=mockBanks(),ids={};metas.forEach(function(m){ids[m.id]=true;});
      Object.keys(custom).forEach(function(id){var m=examMeta(custom[id]);if(ids[id]){metas=metas.map(function(x){return x.id===id?m:x;});}else{metas.push(m);ids[id]=true;}});
      return {exams:metas};
    }
    return this._get('/manifest');
  },
  async exam(id){
    if(DEMO_MODE){
      var custom=mockBanks();if(custom[id])return custom[id];
      var base={exams:[]};try{base=await (await fetch('./data/manifest.json',{cache:'no-cache'})).json();}catch(e){}
      var meta=(base.exams||[]).find(function(e){return e.id===id;});
      var file=meta?meta.file:(id+'.json');
      var r=await fetch('./data/'+file,{cache:'no-cache'});if(!r.ok)throw new Error('加载套题失败');return r.json();
    }
    return this._get('/exam/'+encodeURIComponent(id));
  },
  async saveExam(ex){if(DEMO_MODE){mockSaveBank(ex);return {status:'ok'};}return this._send('POST','/exam',ex);},
  async deleteExam(id){if(DEMO_MODE){mockDeleteBank(id);return {status:'ok'};}return this._send('DELETE','/exam/'+encodeURIComponent(id));},
  async _get(path){return this._handle(await fetch(API_BASE+path,{headers:{'Authorization':'Bearer '+getToken()}}));},
  async _send(method,path,body){return this._handle(await fetch(API_BASE+path,{method:method,headers:{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined}));},
  async _handle(r){
    if(r.status===401){clearAuth();syncAuthUI();navigate('/');toast('登录已过期，请重新登录');throw new Error('未授权');}
    if(!r.ok){var e=await r.json().catch(function(){return {};});throw new Error(e.error||('请求失败 ('+r.status+')'));}
    if(r.status===204)return {status:'ok'};
    return r.json();
  },
  async refreshToken(){
    if(DEMO_MODE)return {token:getToken()};
    var r=await fetch(API_BASE+'/refresh',{method:'POST',headers:{'Authorization':'Bearer '+getToken()}});
    if(!r.ok){
      _refreshFailCount++;
      if(_refreshFailCount>=2){
        clearAllUserData();syncAuthUI();navigate('/');toast('账号已在其他设备登录');
      }
      return null;
    }
    _refreshFailCount=0;
    var j=await r.json();setAuth(j.token,getUser());return j;
  }
};

async function doLogin(username,password,btn,err){
  err.textContent='';
  if(!username||!password){err.textContent='请输入账号和密码';return;}
  btn.disabled=true;btn.textContent='登录中…';
  try{
    var res=await api.login(username,password);
    setAuth(res.token,res.username||username);
    _refreshFailCount=0;
    syncAuthUI();document.title='考前刷题';navigate('/');render();
    if(!DEMO_MODE)startRefreshTimer();
  }catch(e){err.textContent=e.message||'登录失败';btn.disabled=false;btn.textContent='登录';}
}

/* router */
function getRoute(){return (location.hash||'#/').replace(/^#/,'')||'/';}
function navigate(p){location.hash='#'+p;}
window.addEventListener('hashchange',render);
window.addEventListener('DOMContentLoaded',render);

function updateHeaderMeta(){var n=countAllSessions();$('#header-meta').textContent=n>0?(n+' 次记录'):'';}

async function render(){
  var route=getRoute(),view=$('#view');
  syncAuthUI();
  if(!isLoggedIn()){renderLogin(view);updateHeaderMeta();window.scrollTo(0,0);return;}
  // 已登录用户页面加载时启动 refresh 定时器（只在未启动时执行）
  if(!_refreshTimer&&!DEMO_MODE)startRefreshTimer();
  view.innerHTML='<div class="empty"><div class="spinner"></div>加载中…</div>';
  // cleanup any open drawer key handler from quiz
  try{
    if(route==='/'||route===''){await renderHome(view);}
    else if(route==='/manage'){await renderManage(view);}
    else if(route.indexOf('/recite/')===0){await renderRecite(view,decodeURIComponent(route.slice(8)));}
    else if(route.indexOf('/exam/')===0){
      var rest=route.slice(6),pp=rest.split('?'),id=decodeURIComponent(pp[0]);
      var params=new URLSearchParams(pp[1]||'');
      await renderExam(view,id,{redoSid:params.get('redo')||null});
    } else if(route.indexOf('/result/')===0){
      var rest2=route.slice(8),pp2=rest2.split('?'),parts=pp2[0].split('/');
      await renderResult(view,decodeURIComponent(parts[0]),decodeURIComponent(parts[1]||''));
    } else {view.innerHTML='<div class="empty"><div class="ico">🧭</div>页面不存在<br/><button class="btn" onclick="navigate(\'/\')">回首页</button></div>';}
    updateHeaderMeta();
    window.scrollTo(0,0);
  }catch(e){console.error(e);view.innerHTML='<div class="empty"><div class="ico">⚠️</div>'+esc(e.message)+'<br/><button class="btn" onclick="navigate(\'/\')">回首页</button></div>';}
}

/* ===== Recite (背题模式) ===== */
function reciteItemHTML(q,no){
  var ans='';
  if(q.type==='single'||q.type==='multiple'||q.type==='judge'){
    var O=fmtOpts(q),CS={};(q.answer||[]).forEach(function(i){CS[i]=true;});
    ans='<div class="recite-opts">'+O.map(function(o,i){
      var on=!!CS[i];
      return '<div class="recite-opt'+(on?' correct':'')+'"><span class="rc-key">'+o.key+'</span><span class="rc-text">'+esc(o.text)+'</span>'+(on?'<span class="rc-tick">✓</span>':'')+'</div>';
    }).join('')+'</div>';
  } else {
    ans='<div class="recite-blanks">'+(q.blanks||[]).map(function(a,i){return '<div class="recite-blank"><span class="rc-bi">空'+(i+1)+'</span><span class="rc-ba">'+a.map(esc).join('  /  ')+'</span></div>';}).join('')+'</div>';
  }
  var qtext=q.type==='blank'?renderBlankHTML(q.question):esc(q.question);
  var exp=q.explanation?'<button class="rc-exp-btn" data-exp>解析 ▾</button><div class="recite-explain">'+esc(q.explanation)+'</div>':'';
  return '<div class="recite-q"><div class="rc-head"><span class="rc-no">'+no+'</span><span class="q-type '+q.type+'">'+typeName(q.type)+'</span></div>'+
    '<div class="rc-question">'+qtext+'</div>'+ans+exp+'</div>';
}

/* ===== Exam ===== */
async function renderExam(view,examId,o){
  var exam=await loadExam(examId);
  if(!exam||!exam.questions)throw new Error('找不到套题：'+examId);
  var questions=exam.questions,redoInfo=null;
  if(o.redoSid){
    var prev=getSession(exam.id,o.redoSid);
    if(!prev)throw new Error('找不到原始答卷记录');
    questions=exam.questions.filter(function(q){return !gradeQuestion(q,prev.answers[q.id]).correct;});
    if(!questions.length){toast('这次没有错题');navigate('/result/'+encodeURIComponent(exam.id)+'/'+encodeURIComponent(o.redoSid));return;}
    redoInfo={original:exam.questions.length};
  }
  var persistKey='exam-practice:progress:'+exam.id+(o.redoSid?':redo:'+o.redoSid:'');
  var initialState=null,resumed=false;
  if(!o.redoSid){try{var sv=JSON.parse(localStorage.getItem(persistKey)||'null');if(sv&&sv.answers&&Object.keys(sv.answers).length){initialState=sv;resumed=true;}}catch(e){}}
  var sessionId='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  mountQuiz({
    root:view,questions:questions,redoInfo:redoInfo,persistKey:persistKey,initialState:initialState,resumed:resumed,
    onExit:function(){navigate('/');},
    onSubmit:function(res){
      saveSession(exam.id,sessionId,{sessionId:sessionId,examId:exam.id,title:exam.title+(o.redoSid?' · 错题重做':''),finishedAt:res.finishedAt,answers:res.answers,correct:res.correct,total:res.total,score:res.score,redoFrom:o.redoSid||null});
      navigate('/result/'+encodeURIComponent(exam.id)+'/'+encodeURIComponent(sessionId));
    }
  });
}

/* ===== Result ===== */
async function renderResult(view,examId,sessionId){
  var session=getSession(examId,sessionId);
  if(!session){view.innerHTML='<div class="empty"><div class="ico">🗂</div>没找到这次答卷记录<br/><button class="btn" onclick="navigate(\'/\')">回首页</button></div>';return;}
  var exam=await loadExam(examId);
  if(!exam||!exam.questions)throw new Error('找不到套题：'+examId);
  var scope=exam.questions;
  if(session.redoFrom){
    var prev=getSession(exam.id,session.redoFrom);
    if(prev)scope=exam.questions.filter(function(q){return !gradeQuestion(q,prev.answers[q.id]).correct;});
  }
  var wrong=(session.total||scope.length)-(session.correct||0);
  var actions=[
    {label:'重新练习',kind:'ghost',onClick:function(){navigate('/exam/'+encodeURIComponent(examId));}}
  ];
  if(wrong>0)actions.push({label:'重做错题 ('+wrong+')',kind:'warn',onClick:function(){navigate('/exam/'+encodeURIComponent(examId)+'?redo='+encodeURIComponent(sessionId));}});
  actions.push({label:'下载离线版',kind:'subtle',onClick:function(){downloadOffline(exam);}});
  actions.push({label:'返回列表',kind:'ghost',onClick:function(){navigate('/');}});
  renderResultView({
    root:view,scopeQuestions:scope,allQuestions:exam.questions,answers:session.answers,
    score:session.score,correct:session.correct,total:session.total,
    subtitle:session.title,
    redoLabel:session.redoFrom?'错题重做结果（基于原卷 …'+esc(session.redoFrom.slice(-6))+'）':'',
    actions:actions
  });
}

/* ===== Offline export ===== */
async function downloadOffline(target){
  try{
    var exam=(target&&target.questions)?target:await loadExam(target&&target.id?target.id:target);
    var html=buildOfflineHTML(exam);
    var blob=new Blob([html],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=(exam.title||exam.id).replace(/[\\/:*?"<>|]/g,'_')+'.html';
    document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},120);
    toast('已下载离线版');
  }catch(e){toast('下载失败：'+e.message);}
}

function buildOfflineHTML(exam){
  var css=$('#app-css').textContent;
  var engine=$('#engine-js').textContent.replace(/<\/script/gi,'<\\/script');
  var dataJSON=JSON.stringify(exam).replace(/<\/script/gi,'<\\/script');
  var boot=[
    "var EXAM=__DATA__;",
    "var PKEY='exam-offline-progress:'+EXAM.id;",
    "applyTheme();",
    "var tb=document.getElementById('theme-btn');function sb(){tb.textContent=themeGlyph();}sb();tb.onclick=function(){toggleTheme();sb();};",
    "matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){if(getThemePref()==='auto'){applyTheme();sb();}});",
    "window.__toast=function(m,ms){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.__toast._t);window.__toast._t=setTimeout(function(){t.classList.remove('show');},ms||1800);};",
    "var view=document.getElementById('view');",
    "function startQuiz(qs,redoInfo){",
    "  var init=null,resumed=false;",
    "  if(!redoInfo){try{var sv=JSON.parse(localStorage.getItem(PKEY)||'null');if(sv&&sv.answers&&Object.keys(sv.answers).length){init=sv;resumed=true;}}catch(e){}}",
    "  mountQuiz({root:view,questions:qs,redoInfo:redoInfo,persistKey:redoInfo?null:PKEY,initialState:init,resumed:resumed,",
    "    onExit:function(){if(confirm('退出当前练习？进度已自动保存。'))location.reload();},",
    "    onSubmit:function(res){showResult(qs,res);}});",
    "}",
    "function showResult(qs,res){",
    "  var wrong=qs.filter(function(q){return !gradeQuestion(q,res.answers[q.id]).correct;});",
    "  var actions=[{label:'重新练习',kind:'ghost',onClick:function(){try{localStorage.removeItem(PKEY);}catch(e){}startQuiz(EXAM.questions,null);}}];",
    "  if(wrong.length)actions.push({label:'重做错题 ('+wrong.length+')',kind:'warn',onClick:function(){startQuiz(wrong,{original:EXAM.questions.length});}});",
    "  renderResultView({root:view,scopeQuestions:qs,allQuestions:EXAM.questions,answers:res.answers,score:res.score,correct:res.correct,total:res.total,subtitle:EXAM.title+' · 离线版',actions:actions});",
    "  window.scrollTo(0,0);",
    "}",
    "startQuiz(EXAM.questions,null);"
  ].join('\n').replace('__DATA__',dataJSON);

  return '<!doctype html>\n<html lang="zh-CN" data-theme="light">\n<head>\n<meta charset="utf-8"/>\n'+
    '<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"/>\n'+
    '<title>'+esc(exam.title)+' · 离线版</title>\n'+
    '<script>(function(){try{var p=localStorage.getItem("exam-practice:theme");var d=(p==="light"||p==="dark")?p:(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",d);}catch(e){}})();<\/script>\n'+
    '<style>'+css+'</style>\n</head>\n<body>\n'+
    '<header class="app-header"><div class="app-header-in"><div class="brand"><div class="brand-mark"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 7.2l1.8 1.8 3-3.2"></path><path d="M3.5 15.2l1.8 1.8 3-3.2"></path><line x1="12.5" y1="6.5" x2="20.5" y2="6.5"></line><line x1="12.5" y1="15.5" x2="20.5" y2="15.5"></line></svg></div><span class="brand-name">'+esc(exam.title)+'</span></div><div class="header-right"><span class="header-meta">离线版</span><button class="icon-btn" id="theme-btn" aria-label="切换主题">☀</button></div></div></header>\n'+
    '<main class="container"><div id="view"></div></main>\n<div class="toast" id="toast"></div>\n'+
    '<script>'+engine+'<\/script>\n'+
    '<script>'+boot+'<\/script>\n</body>\n</html>';
}
